<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE REPORT - PHL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #157347; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="text-align: center;">
        <h2>HSE REPORT</h2>
        <h3>PHL</h3>
        
        <form style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <input type="text" placeholder="Employee ID" required style="padding: 5px; border: 1px solid #ccc; font-size: 14px;">
            <input type="password" placeholder="Password" required style="padding: 5px; border: 1px solid #ccc; font-size: 14px;">
            <button type="submit" style="padding: 5px 15px; cursor: pointer; font-size: 14px;">Login</button>
        </form>
    </div>

    <!-- यह लाइन जावास्क्रिप्ट को इस पेज से जोड़ती है -->
    <script src="script.js"></script>
</body>
</html>
